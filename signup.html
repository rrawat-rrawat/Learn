<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create an account — Nimbus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<nav class="site-nav">
  <div class="brand"><a href="index.html" style="text-decoration:none;color:inherit;">Nimbus<span>.</span></a></div>
  <ul>
    <li><a href="savings-account/apply.html">Savings Account</a></li>
    <li><a href="term-insurance/quote.html">Term Insurance</a></li>
    <li><a href="shop/index.html">Shop</a></li>
    <li><a href="login.html">Log in</a></li>
  </ul>
</nav>

<section class="section">
  <div class="container">
    <h2 style="text-align:center;">Create your Nimbus account</h2>
    <form class="form-card" id="signup-form">
      <div class="field">
        <label for="signup-name">Full name</label>
        <input type="text" id="signup-name" required>
      </div>
      <div class="field">
        <label for="signup-email">Email address</label>
        <input type="email" id="signup-email" required>
      </div>
      <div class="field">
        <label for="signup-password">Create a password</label>
        <input type="password" id="signup-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create account</button>
      <p style="text-align:center; margin-top:18px; font-size:0.9rem; color:var(--muted);">
        Already have an account? <a href="login.html" style="color:var(--emerald); font-weight:600;">Log in</a>
      </p>
    </form>
  </div>
</section>

<footer>Nimbus — a free practice sandbox for GA4, GTM & BigQuery.</footer>

<script src="assets/dataLayer-events.js"></script>
<script>
  document.getElementById('signup-form').addEventListener('submit', function (e) {
    e.preventDefault();

    // sign_up: fires on successful (simulated) account creation
    trackEvent('sign_up', { method: 'email' });

    window.location.href = 'index.html?signed_up=true';
  });
</script>

</body>
</html>
